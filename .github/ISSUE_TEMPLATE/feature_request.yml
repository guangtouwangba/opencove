name: ✨ Feature Request
description: Suggest an idea or new capability for Cove
title: "[FEAT] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in improving Cove!
        Please describe your idea in detail so we can understand the use case.

  - type: textarea
    id: problem
    attributes:
      label: 🤔 Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: I'm always frustrated when I have to manually manage...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 💡 Proposed Solution
      description: Describe the solution you'd like to see.
      placeholder: I would like a button that automatically...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives Considered
      description: Have you considered other ways to solve this?
      placeholder: I tried using the existing plugin system, but...

  - type: textarea
    id: context
    attributes:
      label: 📷 Additional Context
      description: Add any other context, screenshots, or mockups about the feature request here.
